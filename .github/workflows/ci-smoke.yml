name: ci-smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run minimal tests
        run: |
          python -m unittest -v \
            tests.analysis.test_demo_run_smoke \
            tests.analysis.test_docs_entrypoints_exist \
            tests.analysis.test_readme_product_sections \
            tests.analysis.test_ai_summary_scan_integration \
            tests.analysis.test_ai_risks_integration \
            tests.learn.test_learn_ui_routes

      - name: Run CLI smoke chain
        shell: bash
        run: |
          python -m reposense ci run \
            --repo tests/fixtures/repos/java_api_queue_db_closure_min \
            --out .reposense_ci_smoke \
            --profile demo \
            --with-context-pack \
            --json
          RUN_DIR=$(ls -d .reposense_ci_smoke/run-* | sort | tail -n 1)
          echo "RUN_DIR=$RUN_DIR" >> "$GITHUB_ENV"
          python -m reposense ai patterns "$RUN_DIR" --json
          python -m reposense ai summary "$RUN_DIR" --json --markdown
          python -m reposense ai risks "$RUN_DIR" --json --markdown
          python -m reposense run manifest "$RUN_DIR" --json

      - name: Upload key artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reposense-ci-smoke-artifacts
          path: |
            ${{ env.RUN_DIR }}/report.html
            ${{ env.RUN_DIR }}/patterns.json
            ${{ env.RUN_DIR }}/ai_summary.md
            ${{ env.RUN_DIR }}/ai_risks/risks.md
            ${{ env.RUN_DIR }}/run_manifest.json
